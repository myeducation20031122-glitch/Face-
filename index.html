<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Luminous Flow | Beautiful Particle Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', 'Poppins', 'Inter', 'Montserrat', system-ui, -apple-system, 'BlinkMacSystemFont', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* Elegant overlay text – minimalistic, atmospheric */
        .title-container {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .title {
            display: inline-block;
            font-size: 0.9rem;
            letter-spacing: 3px;
            font-weight: 400;
            text-transform: uppercase;
            background: linear-gradient(135deg, rgba(255,255,240,0.85), rgba(200,200,255,0.7));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(100,150,255,0.3);
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            background-color: rgba(10,10,30,0.25);
            border: 1px solid rgba(255,255,200,0.2);
            font-size: 0.85rem;
        }

        .sub {
            font-size: 0.7rem;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-top: 6px;
            display: block;
            font-weight: 300;
        }

        /* subtle vignette effect via pseudo-element */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 120px rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 640px) {
            .title { font-size: 0.7rem; padding: 5px 14px; }
        }
    </style>
</head>
<body>
<div class="vignette"></div>
<div class="title-container">
    <div class="title">
        ✦ LUMINA FLOW ✦
        <span class="sub">particle constellation • gentle motion</span>
    </div>
</div>

<script>
    (function() {
        // ----- setup canvas -----
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        // ----- global variables -----
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 140;        // rich but performant
        let mouseX = null, mouseY = null;
        let mouseActive = false;
        
        // connection distance threshold (pixels)
        const CONNECT_DIST = 125;
        // attraction / interaction strength
        const MOUSE_ATTRACT_STRENGTH = 0.0009;
        const MOUSE_RADIUS = 180;
        
        // animation frame reference
        let animationId = null;
        
        // ----- helper: random range -----
        function randomRange(min, max) {
            return min + Math.random() * (max - min);
        }
        
        // ----- particle class -----
        class Particle {
            constructor(x, y, vx, vy, size, hue, hueSpeed) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.size = size;
                this.hue = hue;
                this.hueSpeed = hueSpeed;
                this.originalHue = hue;
            }
            
            // update position, apply boundaries, and shift hue gently
            update(mouseXPos, mouseYPos, isMouseActive) {
                // apply mouse attraction if mouse inside canvas
                if (isMouseActive && mouseXPos !== null && mouseYPos !== null) {
                    const dx = mouseXPos - this.x;
                    const dy = mouseYPos - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < MOUSE_RADIUS) {
                        const force = (1 - dist / MOUSE_RADIUS) * MOUSE_ATTRACT_STRENGTH;
                        // smooth pull towards cursor
                        this.vx += dx * force;
                        this.vy += dy * force;
                        // also add slight speed limit to avoid chaotic bursts
                        const maxSpeed = 3.2;
                        if (Math.abs(this.vx) > maxSpeed) this.vx = this.vx > 0 ? maxSpeed : -maxSpeed;
                        if (Math.abs(this.vy) > maxSpeed) this.vy = this.vy > 0 ? maxSpeed : -maxSpeed;
                    }
                }
                
                // add tiny random drift (organic flutter)
                this.vx += (Math.random() - 0.5) * 0.08;
                this.vy += (Math.random() - 0.5) * 0.08;
                
                // damping to keep smoothness
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // update position
                this.x += this.vx;
                this.y += this.vy;
                
                // boundary collision (elastic bounce with slight energy loss)
                const margin = this.size;
                if (this.x < margin) {
                    this.x = margin;
                    this.vx = -this.vx * 0.92;
                }
                if (this.x > width - margin) {
                    this.x = width - margin;
                    this.vx = -this.vx * 0.92;
                }
                if (this.y < margin) {
                    this.y = margin;
                    this.vy = -this.vy * 0.92;
                }
                if (this.y > height - margin) {
                    this.y = height - margin;
                    this.vy = -this.vy * 0.92;
                }
                
                // slowly evolve hue for mesmerizing color shift
                this.hue += this.hueSpeed;
                if (this.hue >= 360) this.hue -= 360;
                if (this.hue < 0) this.hue += 360;
            }
            
            // draw particle with glow-like appearance
            draw(ctx) {
                ctx.beginPath();
                // outer glow: larger circle with lower opacity
                ctx.arc(this.x, this.y, this.size * 1.2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 85%, 65%, 0.25)`;
                ctx.fill();
                
                // main core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.9, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x - 2, this.y - 2, 1, this.x, this.y, this.size);
                gradient.addColorStop(0, `hsl(${this.hue}, 95%, 70%)`);
                gradient.addColorStop(1, `hsl(${this.hue}, 85%, 55%)`);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // tiny sparkling highlight
                ctx.beginPath();
                ctx.arc(this.x - 1, this.y - 1, this.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 250, 210, 0.7)`;
                ctx.fill();
            }
        }
        
        // ----- create particles with natural motion and color variety -----
        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // spawn within canvas boundaries, avoid edges initially
                const x = randomRange(40, width - 40);
                const y = randomRange(40, height - 40);
                // gentle random velocity
                const vx = randomRange(-0.9, 0.9);
                const vy = randomRange(-0.9, 0.9);
                // size variation: 2.2 to 5.2
                const size = randomRange(2.2, 5.2);
                // full spectrum hues
                const hue = randomRange(0, 360);
                // speed of color transition (0.2 to 0.9 degrees per frame)
                const hueSpeed = randomRange(0.2, 0.85) * (Math.random() > 0.5 ? 1 : -1);
                
                particles.push(new Particle(x, y, vx, vy, size, hue, hueSpeed));
            }
        }
        
        // ----- draw connections between nearby particles (beautiful web effect) -----
        function drawConnections() {
            // optimize by skipping if too many checks? but 140 particles => ~9800 checks ~ fine
            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.hypot(dx, dy);
                    if (distance < CONNECT_DIST) {
                        // alpha based on proximity: closer = brighter
                        const alpha = (1 - distance / CONNECT_DIST) * 0.55;
                        // blend hues for a seamless gradient line
                        const avgHue = (p1.hue + p2.hue) / 2;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `hsla(${avgHue}, 80%, 70%, ${alpha * 0.9})`;
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                    }
                }
            }
        }
        
        // ----- draw a subtle glowing background effect (moving aurora-like) -----
        let timeOffset = 0;
        function drawBackground() {
            // dynamic radial gradient that shifts slightly over time
            const grad = ctx.createLinearGradient(0, 0, width * 0.8, height);
            const shift = Math.sin(timeOffset * 0.002) * 0.1;
            grad.addColorStop(0, `rgba(8, 8, 25, 1)`);
            grad.addColorStop(0.4, `rgba(15, 12, 38, 0.95)`);
            grad.addColorStop(0.7, `rgba(25, 18, 48, 0.9)`);
            grad.addColorStop(1, `rgba(10, 8, 32, 1)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            // extra floating nebula effect: soft light spots
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 4; i++) {
                const pulse = (Math.sin(timeOffset * 0.0015 + i) * 0.5 + 0.5) * 0.08;
                const xSpot = (Math.sin(timeOffset * 0.0007 + i) * 0.3 + 0.5) * width;
                const ySpot = (Math.cos(timeOffset * 0.0009 + i * 1.2) * 0.2 + 0.5) * height;
                const rad = width * 0.25;
                const grd = ctx.createRadialGradient(xSpot, ySpot, 10, xSpot, ySpot, rad);
                grd.addColorStop(0, `hsla(${200 + i * 60}, 70%, 55%, 0.08)`);
                grd.addColorStop(1, `hsla(${180 + i * 40}, 65%, 40%, 0)`);
                ctx.fillStyle = grd;
                ctx.fillRect(0, 0, width, height);
            }
            ctx.globalCompositeOperation = 'source-over';
        }
        
        // ----- draw floating particles and additional glow (ambient) -----
        function drawParticlesAndGlow() {
            // draw each particle (main content)
            for (let p of particles) {
                p.draw(ctx);
            }
        }
        
        // ----- apply subtle star-like sparkles (extra magic) -----
        let sparkleArray = [];
        const SPARKLE_COUNT = 70;
        function initSparkles() {
            sparkleArray = [];
            for (let i = 0; i < SPARKLE_COUNT; i++) {
                sparkleArray.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.6,
                    alpha: Math.random() * 0.5 + 0.2,
                    speed: 0.002 + Math.random() * 0.008,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }
        
        function drawSparkles(now) {
            ctx.globalCompositeOperation = 'lighter';
            for (let s of sparkleArray) {
                const twinkle = 0.4 + Math.sin(now * s.speed + s.phase) * 0.35;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size * (0.7 + twinkle * 0.6), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 240, 200, ${s.alpha * twinkle * 0.6})`;
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';
        }
        
        // update sparkle positions with gentle drift (optional)
        function updateSparkles() {
            for (let s of sparkleArray) {
                // very subtle drifting movement
                s.x += (Math.random() - 0.5) * 0.2;
                s.y += (Math.random() - 0.5) * 0.2;
                if (s.x < 0) s.x = width;
                if (s.x > width) s.x = 0;
                if (s.y < 0) s.y = height;
                if (s.y > height) s.y = 0;
            }
        }
        
        // ----- resize canvas and reinitialize particles based on new dimensions -----
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // reinitialize particles to fit new canvas size
            initParticles();
            initSparkles();    // adjust sparkles to new size as well
        }
        
        // ----- mouse/touch interaction handlers -----
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                // touch support
                if (e.touches.length) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    mouseActive = false;
                    return;
                }
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), width);
            canvasY = Math.min(Math.max(0, canvasY), height);
            mouseX = canvasX;
            mouseY = canvasY;
            mouseActive = true;
        }
        
        function handleMouseLeave() {
            mouseActive = false;
            mouseX = null;
            mouseY = null;
        }
        
        // ----- animation loop (beauty in motion) -----
        let lastTimestamp = 0;
        function animate(timestamp) {
            if (!canvas.isConnected) return;
            
            // update time offset for background drift
            timeOffset = timestamp || performance.now();
            
            // 1. draw dreamy background with fading trails for motion blur effect
            drawBackground();
            
            // 2. update all particle physics and apply mouse attraction
            for (let p of particles) {
                p.update(mouseX, mouseY, mouseActive);
            }
            
            // 3. draw connections (ethereal web)
            drawConnections();
            
            // 4. draw sparkling stars
            updateSparkles();
            drawSparkles(timeOffset);
            
            // 5. draw main particles on top (they glow)
            drawParticlesAndGlow();
            
            // extra tiny floating orbs / light embellishment (small bloom effect)
            ctx.globalCompositeOperation = 'lighter';
            for (let p of particles) {
                if (p.size > 3.2) {
                    ctx.beginPath();
                    ctx.arc(p.x + 0.8, p.y + 0.8, p.size * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 85%, 70%, 0.2)`;
                    ctx.fill();
                }
            }
            ctx.globalCompositeOperation = 'source-over';
            
            // optional: draw a subtle mouse aura when active (interactive feedback)
            if (mouseActive && mouseX !== null && mouseY !== null) {
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, MOUSE_RADIUS * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(140, 180, 255, 0.04)`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, MOUSE_RADIUS * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(210, 230, 255, 0.12)`;
                ctx.fill();
            }
            
            // call next frame
            animationId = requestAnimationFrame(animate);
        }
        
        // ----- resize handling and device orientation -----
        window.addEventListener('resize', () => {
            resizeCanvas();
            // reset sparkles to new dimensions (call again ensures they are positioned properly)
            initSparkles();
        });
        
        // Mouse & touch events
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseleave', handleMouseLeave);
        canvas.addEventListener('touchmove', handleMouseMove, { passive: false });
        canvas.addEventListener('touchstart', handleMouseMove);
        canvas.addEventListener('touchend', handleMouseLeave);
        
        // initialize everything
        resizeCanvas();
        
        // start the animation loop
        animationId = requestAnimationFrame(animate);
        
        // optional: dynamic throttle for performance but not needed for modern devices
        // cleanup on page unload (not mandatory but nice)
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
    })();
</script>
</body>
</html>
